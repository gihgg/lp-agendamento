<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/agendamento.css">
    <title>Agendamento - M Eletric</title>
</head>
<body>

    <button class="btn-padrao btn-visualizar" id="btnVisualizar">
        Visualizar Agendamentos
    </button>

    <div id="consulta-container">
        <input
        type="text"
        id="consulta"
        placeholder="Digite seu telefone completo"
        class="form-control"
        >
        <button class="btn-padrao btn-consultar" id="btnConsultar">Consultar</button>
    </div>

    <main id="form_container">
        <div id="form_header">
            <h1 id="form_title">
                Agende seu serviço elétrico
            </h1>

            <button class="btn-padrao" id="btnExit">
                <i class="fa-solid fa-right-to-bracket"></i>
            </button>

        </div>

            <form id="formAgendamento">
                <div id="input_container">


                    <div class="input-box">
                        <label 
                        for="name" 
                        class="form-label">
                        Primeiro nome
                        </label>
                        <div class="input-field">
                            <input 
                            type="text"
                            name="name"
                            id="name"
                            class="form-control"
                            placeholder="Floquinha"
                            >
                            <i class="fa-regular fa-user"></i>
                        </div>
                    </div>


                    <div class="input-box">
                        <label 
                        for="last-name" 
                        class="form-label">
                        Último nome
                        </label>
                        <div class="input-field">
                            <input 
                            type="text"
                            name="last-name"
                            id="last-name"
                            class="form-control"
                            placeholder="de Neves"
                            >
                            <i class="fa-regular fa-user"></i>
                        </div>
                    </div>


                    <div class="input-box">
                        <label 
                        for="marcado" 
                        class="form-label">
                        Data do Agendamento
                        </label>
                        <div class="input-field">
                            <input 
                            type="date"
                            name="marcado"
                            id="marcado"
                            class="form-control"
                            >
                        </div>
                    </div>


                    <div class="input-box">
                        <label 
                        for="telefone" 
                        class="form-label">
                        Telefone
                        </label>
                        <div class="input-field">
                            <input 
                            type="tel"
                            name="telefone"
                            id="telefone"
                            class="form-control"
                            placeholder="(00) 00000 0000"
                            >
                            <i class="fa-solid fa-phone"></i>
                        </div>
                    </div>


                    <div class="radio-container">
                        <label class="form-label">
                            Serviços
                        </label>

                        <div id="services_inputs">

                            <div class="radio-box">
                                <input 
                                type="radio"
                                name="service"
                                id="residencial"
                                class="form-control"
                                value="residencial"
                                >
                                <label 
                                for="residencial" 
                                class="form-label">
                                    Residencial
                                </label>
                            </div>


                            <div class="radio-box">
                                <input 
                                type="radio"
                                name="service"
                                id="industrial"
                                class="form-control"
                                value="industrial"
                                >
                                <label 
                                for="industrial" 
                                class="form-label">
                                    Industrial
                                </label>
                            </div>


                            <div class="radio-box">
                                <input 
                                type="radio"
                                name="service"
                                id="comercial"
                                class="form-control"
                                value="comercial"
                                >
                                <label 
                                for="comercial" 
                                class="form-label">
                                    Comercial
                                </label>
                            </div>


                            <div class="radio-box">
                                <input 
                                type="radio"
                                name="service"
                                id="emergencia"
                                class="form-control"
                                value="emergencia"
                                >
                                <label 
                                for="emergencia" 
                                class="form-label">
                                    Emergência
                                </label>
                            </div>


                        </div>
                    </div>

                </div>

                <button type="submit" class="btn-padrao">
                    Marcar Agendamento
                </button>
            </form>

        

    </main>
    



    <script type="module" src="src/js/agendamento.js"></script>
</body>
</html>
